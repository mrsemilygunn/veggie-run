<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guinea Pig Buffet</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Architects+Daughter&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#f5f0e8;
  --paper-dark:#e8e0cc;
  --ink:#1a1208;
  --ink-mid:#3d2f1a;
  --accent:#b85c2a;
  --red-ink:#9b2020;
}

body{
  background:#7a9e72;
  background-image:
    radial-gradient(ellipse at 20% 30%, #8fb585 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, #6a9060 0%, transparent 45%),
    radial-gradient(ellipse at 50% 10%, #90b882 0%, transparent 40%),
    radial-gradient(ellipse at 10% 80%, #6b9564 0%, transparent 35%);
  font-family:'Caveat',cursive;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
  user-select:none;
}

#hud{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:800px;
  max-width:98vw;
  padding:8px 16px;
  background:var(--paper);
  border:2px solid var(--ink);
  border-bottom:none;
  color:var(--ink);
  font-family:'Architects Daughter',cursive;
  font-size:15px;
  gap:10px;
  flex-wrap:wrap;
}

.hud-block{display:flex;align-items:center;gap:6px}
.hud-label{font-size:11px;font-family:'Caveat',cursive;opacity:0.5;text-transform:lowercase;letter-spacing:0.5px}
.hud-val{font-size:18px;color:var(--ink);font-weight:700;font-family:'Architects Daughter',cursive}

#round-badge{
  background:var(--ink);
  color:var(--paper);
  padding:2px 12px;
  font-size:14px;
  font-family:'Architects Daughter',cursive;
  letter-spacing:1px;
  transform:rotate(-1deg);
  display:inline-block;
}

#game-wrap{position:relative;width:800px;max-width:98vw}

canvas{
  display:block;
  width:100%;
  height:auto;
  border:2px solid var(--ink);
  border-top:none;
  cursor:none;
}

#danger-vignette{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0;
  box-shadow:inset 0 0 90px 50px rgba(155,32,32,0.5);
  transition:opacity 0.4s;
  z-index:5;
}
#danger-vignette.active{opacity:1;animation:pulse-danger 1s infinite alternate}
@keyframes pulse-danger{from{opacity:0.6}to{opacity:1}}

#overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(160deg,#b8d98a 0%,#c8e8a0 35%,#a8c878 65%,#90b860 100%);
  z-index:20;
  color:var(--ink);
  text-align:center;
  padding:24px;
}
#overlay.hidden{display:none}

#overlay h2{
  font-family:'Caveat',cursive;
  font-size:clamp(2.8rem,8vw,5rem);
  font-weight:700;
  color:#2a1a0a;
  margin-bottom:6px;
  text-shadow:2px 3px 0 rgba(255,255,255,0.4);
  line-height:1.1;
}
#overlay .title-sub{
  font-family:'Architects Daughter',cursive;
  font-size:16px;
  color:#3d5a20;
  margin-bottom:22px;
  letter-spacing:2px;
  text-transform:lowercase;
}
#overlay p{font-size:20px;color:#2a3a18;max-width:480px;line-height:1.7;margin-bottom:22px;font-family:'Architects Daughter',cursive;background:rgba(255,255,255,0.35);padding:14px 20px;border:1.5px solid rgba(60,80,20,0.25);}
#overlay .scores{
  display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:20px
}
#overlay .score-card{
  background:rgba(255,255,255,0.6);
  border:1.5px solid rgba(60,50,20,0.3);
  padding:10px 16px;
  font-family:'Architects Daughter',cursive;
  font-size:15px;
  transform:rotate(-0.5deg);
  min-width:110px;
}
#overlay .score-card:nth-child(even){transform:rotate(0.8deg)}
#overlay .score-card span{display:block;font-family:'Caveat',cursive;font-size:13px;opacity:0.6;margin-bottom:2px}

#start-btn{
  font-family:'Architects Daughter',cursive;
  font-size:18px;
  background:var(--ink);
  color:var(--paper);
  border:none;
  padding:10px 28px;
  cursor:pointer;
  letter-spacing:1px;
  transition:opacity 0.1s,transform 0.1s;
  transform:rotate(-0.5deg);
}
#start-btn:hover{opacity:0.85;transform:rotate(0.5deg) scale(1.03)}
#start-btn:active{transform:scale(0.97)}

#hawk-warning{
  position:absolute;
  top:12px;left:50%;transform:translateX(-50%);
  font-family:'Architects Daughter',cursive;
  font-size:17px;
  color:var(--paper);
  background:var(--red-ink);
  padding:5px 18px;
  z-index:10;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
  transition:opacity 0.3s;
  letter-spacing:2px;
  border:1.5px solid var(--ink);
}
#hawk-warning.show{opacity:1}
</style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <div>
      <div class="hud-label">your veggies</div>
      <div class="hud-val" id="hud-score">0</div>
    </div>
  </div>
  <div class="hud-block">
    <div id="round-badge">Round 1</div>
  </div>
  <div class="hud-block">
    <div>
      <div class="hud-label">hidey houses</div>
      <div class="hud-val" id="hud-houses">5</div>
    </div>
  </div>
</div>

<div id="game-wrap">
  <canvas id="c" width="800" height="560"></canvas>
  <div id="danger-vignette"></div>
  <div id="hawk-warning">HAWK!</div>

  <div id="overlay">
    <h2>Guinea Pig Buffet</h2>
    <div class="title-sub">a veggie-grabbing survival game</div>
    <p>Grab veggies with the arrow keys. When the hawk swoops in — hide in a house! Each round, fewer houses...</p>
    <button id="start-btn">Start Game</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 560;

// ── helpers ──────────────────────────────────────────────────────────────
function rnd(a,b){return a+Math.random()*(b-a)}
function rndInt(a,b){return Math.floor(rnd(a,b+1))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

// ── game state ────────────────────────────────────────────────────────────
const VEGGIES = ['carrot','broccoli','corn','lettuce','tomato','pepper'];
const VEGGIE_SCORE = {'carrot':1,'broccoli':2,'corn':1,'lettuce':1,'tomato':2,'pepper':2};
const TOTAL_ROUNDS = 5;
const BASE_HOUSES = 5; // round 1 houses

let round=1, phase='title'; // phases: title, countdown, playing, hawk, hawk-grace, result, gameover
let countdownVal=3, countdownTimer=0;
let firstHawk=true;
let keys={};
let frameId;

let player, rivals, veggies, houses, hawk;
let hawkTimer=0, hawkInterval=0;
let veggieCap=14; // max veggies on screen at once
let dangerEl=document.getElementById('danger-vignette');
let warningEl=document.getElementById('hawk-warning');
let overlay=document.getElementById('overlay');
let scoreDisplay={};

// total scores across rounds
let playerTotal=0;
let rivalTotals=[0,0,0];

// ── grass tile pattern (unused - kept for reference) ──────────────────────

// ── sketch drawing helpers ────────────────────────────────────────────────
// Draw a tiny paper scrap behind each sprite
function drawPaperScrap(x,y,w,h,angle=0){
  ctx.save();
  ctx.translate(x,y); ctx.rotate(angle);
  ctx.fillStyle='#f5f0e8';
  ctx.strokeStyle='#1a1208';
  ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.rect(-w/2,-h/2,w,h);
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

// Guinea pig: round body, tiny ears, dot eyes, snout
function drawGPSketch(x,y,size,flip,opacity,isPlayer,caught){
  ctx.save();
  ctx.globalAlpha=opacity;
  ctx.translate(x,y);
  if(flip) ctx.scale(-1,1);

  let s=size/30; // scale factor

  // paper scrap behind
  drawPaperScrap(0,0,size*1.1,size*0.95, flip?(isPlayer?0.05:-0.04):(isPlayer?-0.05:0.04));

  ctx.strokeStyle='#2a1a0a';
  ctx.fillStyle='#c8a878';
  ctx.lineWidth=1.2*s*30/size+0.5;

  // body (rounded rect)
  ctx.beginPath();
  ctx.ellipse(0,2*s,11*s,9*s,0,0,Math.PI*2);
  ctx.fill(); ctx.stroke();

  // head
  ctx.beginPath();
  ctx.ellipse(-3*s,-7*s,8*s,7*s,-.15,0,Math.PI*2);
  ctx.fill(); ctx.stroke();

  // ear
  ctx.fillStyle='#e0b898';
  ctx.beginPath();
  ctx.ellipse(-9*s,-12*s,3*s,4*s,-.3,0,Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(1*s,-13*s,2.5*s,3.5*s,.2,0,Math.PI*2);
  ctx.fill(); ctx.stroke();

  // eye
  ctx.fillStyle='#1a1208';
  ctx.beginPath();
  ctx.arc(-5*s,-7*s,1.4*s,0,Math.PI*2);
  ctx.fill();
  // shine
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(-4.4*s,-7.5*s,0.5*s,0,Math.PI*2);
  ctx.fill();

  // nose
  ctx.fillStyle='#d4806a';
  ctx.beginPath();
  ctx.ellipse(-1*s,-4*s,2*s,1.4*s,0,0,Math.PI*2);
  ctx.fill();

  // fur tuft on forehead
  ctx.strokeStyle='#8a6a40';
  ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(-3*s,-13*s);
  ctx.quadraticCurveTo(-2*s,-17*s,-1*s,-14*s);
  ctx.stroke();

  // YOU label for player
  if(isPlayer){
    ctx.restore();
    ctx.save();
    ctx.translate(x,y);
    ctx.font=`bold ${Math.round(10*s*2+8)}px 'Architects Daughter',cursive`;
    ctx.fillStyle='#3d2f1a';
    ctx.textAlign='center';
    ctx.fillText('YOU',0,-size*0.75);
  }

  // dazed stars if caught
  if(caught){
    ctx.restore();
    ctx.save();
    ctx.translate(x,y);
    ctx.font=`${Math.round(12*s*2)}px serif`;
    ctx.textAlign='center';
    ctx.fillText('★',size*0.3,-size*0.6);
  }

  ctx.restore();
}

// House: simple A-frame sketch
function drawHouseSketch(x,y,bounce,occupied){
  ctx.save();
  ctx.translate(x, y + (bounce ? Math.sin(Date.now()/130)*4 : 0));

  let s=1;
  // paper scrap
  drawPaperScrap(0,0,50,46,0.03);

  ctx.strokeStyle='#2a1a0a';
  ctx.lineWidth=1.4;

  // walls
  ctx.fillStyle=occupied?'#c8b898':'#e8dcc8';
  ctx.beginPath();
  ctx.rect(-14,-4,28,18);
  ctx.fill(); ctx.stroke();

  // roof
  ctx.fillStyle=occupied?'#a06848':'#c07850';
  ctx.beginPath();
  ctx.moveTo(-18,-4); ctx.lineTo(0,-22); ctx.lineTo(18,-4);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // door
  ctx.fillStyle=occupied?'#6a4a2a':'#8a6040';
  ctx.beginPath();
  ctx.rect(-5,2,10,12);
  ctx.fill(); ctx.stroke();

  // chimney
  ctx.fillStyle='#a08060';
  ctx.beginPath();
  ctx.rect(6,-20,5,10);
  ctx.fill(); ctx.stroke();

  // window
  ctx.strokeStyle='#5a8aaa';
  ctx.lineWidth=1;
  ctx.strokeRect(-12,0,7,6);
  ctx.beginPath(); ctx.moveTo(-12,3); ctx.lineTo(-5,3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-8.5,0); ctx.lineTo(-8.5,6); ctx.stroke();

  // lock icon if occupied
  if(occupied){
    ctx.fillStyle='#2a1a0a';
    ctx.font='8px serif';
    ctx.textAlign='center';
    ctx.fillText('🔒',12,-10);
  }

  // glow outline when bouncing and free
  if(bounce && !occupied){
    ctx.strokeStyle='rgba(180,140,40,0.5)';
    ctx.lineWidth=3;
    ctx.strokeRect(-20,-24,40,46);
  }

  ctx.restore();
}

// Veggie sketches: carrot, broccoli, corn, lettuce, tomato, pepper
function drawVeggieSketch(x,y,type,bob){
  ctx.save();
  ctx.translate(x, y+bob);
  // paper scrap
  drawPaperScrap(0,0,26,26,0.08);
  ctx.strokeStyle='#2a1a0a';
  ctx.lineWidth=1.1;

  if(type==='carrot'){
    ctx.fillStyle='#e8782a';
    ctx.beginPath(); ctx.moveTo(0,10); ctx.bezierCurveTo(-6,-2,-6,-10,0,-12); ctx.bezierCurveTo(6,-10,6,-2,0,10); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='#4a8a30'; ctx.lineWidth=1;
    for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(i*3,-12);ctx.quadraticCurveTo(i*5,-18,i*2,-20);ctx.stroke();}
  } else if(type==='broccoli'){
    ctx.fillStyle='#5a8a30'; ctx.beginPath(); ctx.arc(-4,-6,6,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(4,-4,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,-10,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#6a5a30'; ctx.beginPath(); ctx.rect(-2,0,4,10); ctx.fill(); ctx.stroke();
  } else if(type==='corn'){
    ctx.fillStyle='#e8c830'; ctx.beginPath(); ctx.ellipse(0,0,5,10,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='#c8a010'; ctx.lineWidth=0.6;
    for(let yy=-7;yy<8;yy+=3){ctx.beginPath();ctx.moveTo(-4,yy);ctx.lineTo(4,yy);ctx.stroke();}
    ctx.strokeStyle='#4a7a20'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-3,-10); ctx.quadraticCurveTo(-8,-16,-4,-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3,-10); ctx.quadraticCurveTo(8,-16,5,-14); ctx.stroke();
  } else if(type==='lettuce'){
    ctx.fillStyle='#78b840';
    for(let a=0;a<6;a++){ctx.save();ctx.rotate(a*Math.PI/3);ctx.beginPath();ctx.ellipse(0,-7,4,7,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();}
    ctx.fillStyle='#a8d860'; ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill(); ctx.stroke();
  } else if(type==='tomato'){
    ctx.fillStyle='#d83030'; ctx.beginPath(); ctx.arc(0,2,9,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#4a8a20'; ctx.strokeStyle='#2a5a10';
    ctx.beginPath(); ctx.moveTo(0,-7); ctx.bezierCurveTo(-6,-14,-8,-10,-4,-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-7); ctx.bezierCurveTo(6,-14,8,-10,4,-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(0,-12); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(-3,0,3,Math.PI*1.1,Math.PI*1.7); ctx.stroke();
  } else { // pepper
    ctx.fillStyle='#c83030'; ctx.beginPath(); ctx.moveTo(0,-10); ctx.bezierCurveTo(10,-8,10,8,0,12); ctx.bezierCurveTo(-10,8,-10,-8,0,-10); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='#4a8a20'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(2,-16); ctx.stroke();
  }
  ctx.restore();
}

// Hawk sketch
function drawHawkSketch(x,y,flip){
  ctx.save();
  ctx.translate(x,y);
  if(flip) ctx.scale(-1,1);
  drawPaperScrap(0,0,54,38,flip?-0.06:0.06);
  ctx.strokeStyle='#2a1a0a';
  ctx.lineWidth=1.3;

  // body
  ctx.fillStyle='#8a6030';
  ctx.beginPath(); ctx.ellipse(0,2,12,7,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // head
  ctx.fillStyle='#c8a860';
  ctx.beginPath(); ctx.ellipse(13,-3,7,6,0.3,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // beak
  ctx.fillStyle='#d8a030';
  ctx.beginPath(); ctx.moveTo(19,-2); ctx.lineTo(24,0); ctx.lineTo(19,2); ctx.closePath(); ctx.fill(); ctx.stroke();

  // eye
  ctx.fillStyle='#1a1208'; ctx.beginPath(); ctx.arc(15,-4,1.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(15.5,-4.4,0.5,0,Math.PI*2); ctx.fill();

  // wings spread
  ctx.fillStyle='#6a4820';
  ctx.beginPath(); ctx.moveTo(-2,0); ctx.bezierCurveTo(-8,-14,-20,-16,-24,-10); ctx.bezierCurveTo(-18,-4,-8,2,-2,4); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,0); ctx.bezierCurveTo(6,-12,16,-14,20,-8); ctx.bezierCurveTo(14,-2,6,2,2,4); ctx.closePath(); ctx.fill(); ctx.stroke();

  // wing feather lines
  ctx.strokeStyle='#3a2810'; ctx.lineWidth=0.7;
  [[-18,-10],[-14,-8],[-10,-6]].forEach(([wx,wy])=>{ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx+3,wy+5);ctx.stroke();});
  [[16,-8],[12,-6],[8,-4]].forEach(([wx,wy])=>{ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx-3,wy+5);ctx.stroke();});

  // talons
  ctx.strokeStyle='#4a3818'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-4,7); ctx.lineTo(-6,12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,8); ctx.lineTo(0,13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4,7); ctx.lineTo(6,12); ctx.stroke();

  ctx.restore();
}

function drawGP(gp, isPlayer=false){
  if(gp.hiding){
    ctx.save(); ctx.globalAlpha=0.3;
    drawGPSketch(gp.x,gp.y,isPlayer?28:22,gp.vx<0,1,false,false);
    ctx.restore(); return;
  }
  drawGPSketch(gp.x,gp.y,isPlayer?28:22,gp.vx<0,gp.caught?0.5:1,isPlayer,gp.caught);
}

function drawHouse(h){
  drawHouseSketch(h.x,h.y,h.bounce,h.occupant!==null);
}

function drawVeggie(v){
  if(v.collected) return;
  let bob=Math.sin(Date.now()/400+v.phase)*3;
  drawVeggieSketch(v.x,v.y,v.type,bob);
}

function drawHawk(){
  if(!hawk.active) return;
  if(hawk.trail && hawk.trail.length>1){
    ctx.save();
    ctx.strokeStyle='rgba(120,60,20,0.15)';
    ctx.lineWidth=2;
    ctx.setLineDash([4,8]);
    ctx.beginPath();
    hawk.trail.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  drawHawkSketch(hawk.x,hawk.y,hawk.vx<0);
}
let floaties=[];
function spawnFloaty(x,y,text,color='#ff4444'){
  floaties.push({x,y,text,color,life:1.0});
}
function updateFloaties(){
  floaties=floaties.filter(f=>f.life>0);
  floaties.forEach(f=>f.life-=0.018);
}
function drawFloaties(){
  floaties.forEach(f=>{
    ctx.save();
    ctx.globalAlpha=f.life;
    ctx.font=`bold 20px 'Special Elite',cursive`;
    ctx.fillStyle=f.color;
    ctx.strokeStyle='rgba(245,240,232,0.8)';
    ctx.lineWidth=3;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    let yOff=(1-f.life)*55;
    ctx.strokeText(f.text,f.x,f.y-yOff);
    ctx.fillText(f.text,f.x,f.y-yOff);
    ctx.restore();
  });
}

function launchHawk(){
  // Start near center of field so it can never immediately exit
  hawk={
    active:true,
    x:rnd(W*0.3,W*0.7),
    y:rnd(H*0.3,H*0.7),
    vx:rnd(-1,1)||1,
    vy:rnd(-1,1)||1,
    speed:1.8+round*0.15,
    trail:[],
  };

  player.caught=false;
  rivals.forEach(r=>r.caught=false);

  dangerEl.classList.add('active');
  warningEl.classList.add('show');
  warningEl.textContent='HAWK!';
  houses.forEach(h=>h.bounce=true);

  if(firstHawk){
    firstHawk=false;
    phase='hawk-grace';
    setTimeout(()=>{ if(phase==='hawk-grace') phase='hawk'; },4000);
  } else {
    phase='hawk';
  }
}

function updateHawk(){
  if(!hawk.active) return;

  // Count unresolved targets (not hiding, not caught)
  let targets=[];
  if(!player.hiding && !player.caught) targets.push(player);
  rivals.forEach(r=>{ if(!r.hiding && !r.caught) targets.push(r); });

  // End round only in real hawk phase when everything is resolved
  if(phase==='hawk' && targets.length===0){
    hawk.active=false;
    dangerEl.classList.remove('active');
    warningEl.classList.remove('show');
    houses.forEach(h=>{ h.bounce=false; h.occupant=null; });
    if(player.hiding) leaveHouse(player);
    rivals.forEach(r=>{ if(r.hiding) leaveHouse(r); });
    endRound();
    return;
  }

  // Pick nearest target to chase; during grace just orbit center
  let target=null;
  if(phase==='hawk' && targets.length>0){
    let nd=Infinity;
    targets.forEach(t=>{ let d=dist(hawk,t); if(d<nd){nd=d;target=t;} });
  }

  // Turn toward target (strong turn rate so it actually curves)
  let prevVx=hawk.vx, prevVy=hawk.vy;
  if(target){
    let dx=target.x-hawk.x, dy=target.y-hawk.y, d=Math.hypot(dx,dy)||1;
    hawk.vx += (dx/d) * 0.25;
    hawk.vy += (dy/d) * 0.25;
  } else {
    // No target yet — drift toward center
    let dx=W/2-hawk.x, dy=H/2-hawk.y, d=Math.hypot(dx,dy)||1;
    hawk.vx += (dx/d) * 0.1;
    hawk.vy += (dy/d) * 0.1;
  }

  // Debug: log hawk state every 120 frames
  if(!hawk._dbgFrame) hawk._dbgFrame=0;
  hawk._dbgFrame++;
  if(hawk._dbgFrame%120===0){
    console.log('HAWK phase:',phase,'pos:',Math.round(hawk.x),Math.round(hawk.y),
      'vel:',hawk.vx.toFixed(2),hawk.vy.toFixed(2),
      'targets:',targets.length, 'active:',hawk.active);
  }

  // Hard wall bounce — never exits
  if(hawk.x < 50)   hawk.vx = Math.abs(hawk.vx);
  if(hawk.x > W-50) hawk.vx = -Math.abs(hawk.vx);
  if(hawk.y < 50)   hawk.vy = Math.abs(hawk.vy);
  if(hawk.y > H-50) hawk.vy = -Math.abs(hawk.vy);

  // Normalize to constant speed
  let spd=Math.hypot(hawk.vx,hawk.vy)||1;
  hawk.vx = hawk.vx/spd * hawk.speed;
  hawk.vy = hawk.vy/spd * hawk.speed;

  hawk.x += hawk.vx;
  hawk.y += hawk.vy;
  hawk.x = clamp(hawk.x, 50, W-50);
  hawk.y = clamp(hawk.y, 50, H-50);

  hawk.trail.push({x:hawk.x, y:hawk.y});
  if(hawk.trail.length>40) hawk.trail.shift();

  // Catches — real hawk phase only
  if(phase==='hawk'){
    if(!player.hiding && !player.caught && dist(hawk,player)<44){
      player.caught=true;
      let penalty=Math.max(5,Math.round(player.score*0.25));
      player.score=Math.max(0,player.score-penalty);
      spawnFloaty(player.x,player.y-10,`-${penalty} veggies`,'#9b2020');
      warningEl.textContent='CAUGHT!';
      setTimeout(()=>{ if(hawk.active) warningEl.textContent='HAWK!'; },1500);
    }
    rivals.forEach(r=>{
      if(!r.hiding && !r.caught && dist(hawk,r)<38){
        r.caught=true;
        let pen=Math.max(3,Math.round(r.score*0.25));
        r.score=Math.max(0,r.score-pen);
        spawnFloaty(r.x,r.y-10,`-${pen}`,'#9b2020');
      }
    });
  }
}
function initRound(){
  let numHouses = Math.max(1, BASE_HOUSES - (round-1));
  document.getElementById('hud-houses').textContent=numHouses+' 🏠';
  document.getElementById('round-badge').textContent='Round '+round;

  // player
  player={
    x:W/2, y:H/2,
    vx:0, vy:0,
    speed:1.6,
    score:0,
    hiding:false,
    houseRef:null,
    caught:false
  };

  // rivals (3 AI guinea pigs) — slow and deliberate
  rivals=[
    {x:120,y:120,vx:0,vy:0,speed:0.9,score:0,hiding:false,houseRef:null,target:null,caught:false},
    {x:W-120,y:120,vx:0,vy:0,speed:1.0,score:0,hiding:false,houseRef:null,target:null,caught:false},
    {x:W/2,y:H-120,vx:0,vy:0,speed:0.85,score:0,hiding:false,houseRef:null,target:null,caught:false},
  ];

  // veggies — start with a handful, they'll respawn continuously
  veggies=[];
  for(let i=0;i<veggieCap;i++) spawnVeggie();

  // houses
  houses=[];
  let margin=60;
  // spread houses around the map, not too close to center
  let candidates=[
    {x:margin,y:margin},{x:W-margin,y:margin},
    {x:margin,y:H-margin},{x:W-margin,y:H-margin},
    {x:W/2,y:margin},{x:W/2,y:H-margin},
    {x:margin,y:H/2},{x:W-margin,y:H/2},
    {x:200,y:200},{x:W-200,y:200},
    {x:200,y:H-200},{x:W-200,y:H-200},
  ];
  // shuffle
  candidates.sort(()=>Math.random()-0.5);
  for(let i=0;i<numHouses;i++){
    houses.push({x:candidates[i].x, y:candidates[i].y, occupant:null, bounce:false});
  }

  // hawk placeholder — launchHawk() fills it in properly
  hawk={active:false,x:-100,y:-100,vx:0,vy:0,trail:[]};
  hawkInterval = Math.max(12000, 22000 - (round-1)*2000);
  hawkTimer = hawkInterval;

  dangerEl.classList.remove('active');
  warningEl.classList.remove('show');
  // brief countdown before play starts
  countdownVal=3;
  countdownTimer=0;
  phase='countdown';
}

function spawnVeggie(){
  // keep away from houses
  let margin=40, attempts=0, x, y;
  do {
    x=margin+Math.random()*(W-margin*2);
    y=margin+Math.random()*(H-margin*2);
    attempts++;
  } while(attempts<10 && houses && houses.some(h=>Math.hypot(h.x-x,h.y-y)<50));

  veggies.push({
    x, y,
    type:VEGGIES[rndInt(0,VEGGIES.length-1)],
    collected:false,
    phase:Math.random()*Math.PI*2
  });
}

function maintainVeggies(){
  // remove collected, respawn up to cap
  veggies=veggies.filter(v=>!v.collected);
  while(veggies.length<veggieCap) spawnVeggie();
}

// ── AI ────────────────────────────────────────────────────────────────────
function updateRival(r){
  if(r.hiding) return;

  if(phase==='hawk'||phase==='hawk-grace'){
    if(r.caught){
      // stumble slowly away from hawk
      if(hawk.active){
        let hx=r.x-hawk.x, hy=r.y-hawk.y, hd=Math.hypot(hx,hy)||1;
        r.x+=hx/hd*r.speed*0.3;
        r.y+=hy/hd*r.speed*0.3;
        clampToWorld(r);
      }
      return;
    }

    // find nearest free house
    let best=null, bd=Infinity;
    houses.forEach(h=>{
      if(h.occupant===null||h.occupant===r){
        let d=dist(r,h); if(d<bd){bd=d;best=h;}
      }
    });

    // actively flee hawk while moving toward house
    let mx=0,my=0;
    if(best){
      let dx=best.x-r.x, dy=best.y-r.y, d=Math.hypot(dx,dy)||1;
      mx=dx/d; my=dy/d;
    }
    if(hawk.active){
      let hx=r.x-hawk.x, hy=r.y-hawk.y, hd=Math.hypot(hx,hy)||1;
      let urgency=Math.max(0,1-hd/250);
      mx+=hx/hd*(1+urgency*3);
      my+=hy/hd*(1+urgency*3);
      let ml=Math.hypot(mx,my)||1;
      mx/=ml; my/=ml;
    }
    r.x+=mx*r.speed*1.5;
    r.y+=my*r.speed*1.5;
    r.vx=mx; r.vy=my;
    clampToWorld(r);

    // enter house if close enough and vacant
    if(best && dist(r,best)<28 && best.occupant===null){
      hideIn(r,best);
    }
    return;
  }

  // foraging
  if(!r.target||r.target.collected){
    let best=null,bd=Infinity;
    veggies.forEach(v=>{
      if(!v.collected){let d=dist(r,v);if(d<bd){bd=d;best=v;}}
    });
    r.target=best;
  }
  if(r.target){
    moveToward(r,r.target.x,r.target.y);
    if(dist(r,r.target)<20){
      r.target.collected=true;
      r.score+=VEGGIE_SCORE[r.target.type]||1;
      r.target=null;
    }
  }
  clampToWorld(r);
}

function moveToward(e,tx,ty){
  let dx=tx-e.x, dy=ty-e.y, d=Math.hypot(dx,dy);
  if(d<1) return;
  e.vx=dx/d*e.speed; e.vy=dy/d*e.speed;
  e.x+=e.vx; e.y+=e.vy;
}

function hideIn(entity,house){
  house.occupant=entity;
  entity.hiding=true;
  entity.houseRef=house;
  entity.x=house.x; entity.y=house.y;
}

function leaveHouse(entity){
  if(entity.houseRef){entity.houseRef.occupant=null;}
  entity.hiding=false; entity.houseRef=null;
}

function clampToWorld(e){
  e.x=clamp(e.x,20,W-20);
  e.y=clamp(e.y,20,H-20);
}

// ── hawk logic ────────────────────────────────────────────────────────────
function launchHawk(){
  let fromLeft=Math.random()<0.5;
  // hawk speed: slow enough to give time to react, faster each round
  let speed = 1.8 + round*0.2;
  hawk.x=fromLeft?-80:W+80;
  hawk.y=60+Math.random()*(H*0.45);
  hawk.vx=fromLeft?speed:-speed;
  hawk.active=true;
  hawk.done=false;
  // reset caught states for this pass
  player.caught=false;
  rivals.forEach(r=>r.caught=false);

  dangerEl.classList.add('active');
  warningEl.classList.add('show');
  warningEl.textContent='🦅 HAWK!';
  houses.forEach(h=>h.bounce=true);

  if(firstHawk){
    phase='hawk-grace';
    firstHawk=false;
    // extra 4 seconds grace on first hawk
    setTimeout(()=>{if(phase==='hawk-grace') phase='hawk';},4000);
  } else {
    phase='hawk';
  }
}

function updateHawk(){
  if(!hawk.active) return;
  hawk.x+=hawk.vx;
  // hawk gone off screen — this ends the round
  if(hawk.x<-120||hawk.x>W+120){
    hawk.active=false;
    dangerEl.classList.remove('active');
    warningEl.classList.remove('show');
    houses.forEach(h=>{h.bounce=false; h.occupant=null;});
    // release everyone
    if(player.hiding) leaveHouse(player);
    rivals.forEach(r=>{if(r.hiding)leaveHouse(r);});
    // round is over!
    endRound();
    return;
  }

  // catch unsheltered guinea pigs during hawk phase
  if(phase==='hawk'){
    // check player
    if(!player.hiding && !player.caught){
      if(Math.abs(hawk.x-player.x)<52&&Math.abs(hawk.y-player.y)<60){
        player.caught=true;
        player.score=Math.max(0,player.score-4);
        showCaughtEffect('player');
      }
    }
    // check rivals
    rivals.forEach(r=>{
      if(!r.hiding && !r.caught){
        if(Math.abs(hawk.x-r.x)<52&&Math.abs(hawk.y-r.y)<60){
          r.caught=true;
          r.score=Math.max(0,r.score-3);
        }
      }
    });
  }
}

// (caught feedback now via spawnFloaty — see updateHawk)

// ── player input ──────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  // prevent page scroll
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.code]=false);

function updatePlayer(){
  if(player.hiding){
    if(phase==='playing'&&(keys.ArrowUp||keys.ArrowDown||keys.ArrowLeft||keys.ArrowRight)){
      leaveHouse(player);
    }
    return;
  }

  let dx=0,dy=0;
  if(keys.ArrowLeft||keys.KeyA){dx=-1;}
  if(keys.ArrowRight||keys.KeyD){dx=1;}
  if(keys.ArrowUp||keys.KeyW){dy=-1;}
  if(keys.ArrowDown||keys.KeyS){dy=1;}
  if(dx&&dy){dx*=0.707;dy*=0.707;}

  // caught players move at half speed and can't collect
  let spd = player.caught ? player.speed*0.5 : player.speed;
  player.vx=dx*spd;
  player.vy=dy*spd;
  player.x+=player.vx;
  player.y+=player.vy;
  clampToWorld(player);

  // collect veggies unless caught
  if(!player.caught){
    veggies.forEach(v=>{
      if(!v.collected&&dist(player,v)<22){
        v.collected=true;
        player.score+=VEGGIE_SCORE[v.type]||1;
      }
    });
  }

  // enter house during hawk (either phase)
  if((phase==='hawk'||phase==='hawk-grace') && !player.caught){
    houses.forEach(h=>{
      if(h.occupant===null&&dist(player,h)<30){
        hideIn(player,h);
      }
    });
  }
}

function endRound(){
  phase='result';
  // save scores
  playerTotal+=player.score;
  rivals.forEach((r,i)=>rivalTotals[i]+=r.score);

  if(round>=TOTAL_ROUNDS){
    showGameOver();
  } else {
    showRoundResult();
  }
}

function showRoundResult(){
  dangerEl.classList.remove('active');
  warningEl.classList.remove('show');

  // safe = was hiding when hawk left. caught = got hit by hawk. 
  // If there weren't enough houses, unhidden guinea pigs who weren't physically hit are neither — show neutral.
  let numHouses = Math.max(1, BASE_HOUSES - (round-1));
  let totalGPs = 4; // player + 3 rivals
  let housesShorted = numHouses < totalGPs;

  function safeStatus(gp){
    if(gp.caught) return 'caught';
    if(gp.hiding) return 'safe';
    // was outside but not hit — only show as "safe" if there were enough houses for everyone
    return housesShorted ? 'lucky' : 'safe';
  }

  let allGPs=[
    {name:'You', gp:player, score:player.score, total:playerTotal},
    {name:'Ginger', gp:rivals[0], score:rivals[0].score, total:rivalTotals[0]},
    {name:'Rosie',  gp:rivals[1], score:rivals[1].score, total:rivalTotals[1]},
    {name:'Biscuit',gp:rivals[2], score:rivals[2].score, total:rivalTotals[2]},
  ].map(p=>({...p, status:safeStatus(p.gp)}))
   .sort((a,b)=>b.score-a.score);

  function safeTag(status){
    if(status==='safe')   return '<span style="color:#86efac">✓ safe</span>';
    if(status==='caught') return '<span style="color:#fca5a5">✗ caught</span>';
    return '<span style="color:#fde68a">~ outside</span>';
  }

  let nextHouses=Math.max(1,BASE_HOUSES-round);
  let html=`<h2>Round ${round} done!</h2>
    <p>Next round: only <strong>${nextHouses} hidey house${nextHouses>1?'s':''}</strong>. Watch out!</p>
    <div class="scores">
    ${allGPs.map(p=>`<div class="score-card">${p.name}<br>${safeTag(p.status)}<br><span>this round</span>+${p.score}<br><span>total</span>${p.total}</div>`).join('')}
    </div>
    <button id="start-btn">Round ${round+1} &rarr;</button>`;
  overlay.innerHTML=html;
  overlay.classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click',()=>{
    round++;
    overlay.classList.add('hidden');
    initRound();
  });
}

function showGameOver(){
  phase='gameover';
  dangerEl.classList.remove('active');
  warningEl.classList.remove('show');

  let all=[
    {name:'You',total:playerTotal,emoji:'🐹'},
    {name:'Ginger',total:rivalTotals[0],emoji:'🐹'},
    {name:'Rosie',total:rivalTotals[1],emoji:'🐹'},
    {name:'Biscuit',total:rivalTotals[2],emoji:'🐹'},
  ].sort((a,b)=>b.total-a.total);

  let winner=all[0];
  let playerWon=winner.name==='You';

  let html=`<h2>${playerWon?'You win!':winner.name+' wins!'}</h2>
    <p>${playerWon?'You collected the most veggies. Champion guinea pig!':'Better luck next time!'}</p>
    <div class="scores">
    ${all.map((p,i)=>`<div class="score-card">${i===0?'1st':i===1?'2nd':i===2?'3rd':'4th'} — ${p.name}<br><span>total veggies</span>${p.total}</div>`).join('')}
    </div>
    <button id="start-btn">Play Again</button>`;
  overlay.innerHTML=html;
  overlay.classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click',()=>{
    round=1; playerTotal=0; rivalTotals=[0,0,0]; firstHawk=true;
    overlay.classList.add('hidden');
    document.getElementById('hud-score').textContent='0';
    initRound();
  });
}

// ── background ────────────────────────────────────────────────────────────
function drawBg(){
  // sage green watercolor base
  ctx.fillStyle='#c8d9a0';
  ctx.fillRect(0,0,W,H);

  // soft watercolor blotches for depth
  let blotches=[
    [W*0.15,H*0.2,130,80,'rgba(180,210,140,0.35)'],
    [W*0.7,H*0.15,110,70,'rgba(150,190,110,0.3)'],
    [W*0.5,H*0.6,160,100,'rgba(140,185,100,0.28)'],
    [W*0.85,H*0.55,100,65,'rgba(170,205,130,0.32)'],
    [W*0.2,H*0.75,120,75,'rgba(155,195,115,0.25)'],
    [W*0.6,H*0.85,90,55,'rgba(145,188,108,0.3)'],
  ];
  blotches.forEach(([x,y,rw,rh,c])=>{
    ctx.save();
    ctx.fillStyle=c;
    ctx.beginPath();
    ctx.ellipse(x,y,rw,rh,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // faint wobbly field border sketch
  ctx.save();
  ctx.strokeStyle='rgba(60,50,20,0.2)';
  ctx.lineWidth=1.5;
  ctx.setLineDash([6,8]);
  ctx.beginPath();
  ctx.moveTo(28,28); ctx.lineTo(W-28,28);
  ctx.lineTo(W-28,H-28); ctx.lineTo(28,H-28);
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── main loop ─────────────────────────────────────────────────────────────
let last=0;
function loop(ts){
  let dt=ts-last; last=ts;
  frameId=requestAnimationFrame(loop);

  if(phase==='title'||phase==='result'||phase==='gameover') return;

  // countdown freeze
  if(phase==='countdown'){
    countdownTimer+=dt;
    // draw everything frozen
    drawBg();
    veggies.forEach(v=>drawVeggie(v));
    houses.forEach(h=>drawHouse(h));
    rivals.forEach(r=>drawGP(r,false));
    drawGP(player,true);
    // big countdown number
    let num = countdownTimer<1000?'3':countdownTimer<2000?'2':countdownTimer<3000?'1':'GO!';
    let scale = 1+(0.3*((countdownTimer%1000)/1000)); // pulse
    ctx.save();
    ctx.globalAlpha=Math.min(1,1.2-((countdownTimer%1000)/1000));
    ctx.font=`bold ${Math.round(80*scale)}px 'Special Elite',cursive`;
    ctx.fillStyle='#1a1208';
    ctx.strokeStyle='rgba(245,240,232,0.7)';
    ctx.lineWidth=5;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.strokeText(num,W/2,H/2);
    ctx.fillText(num,W/2,H/2);
    ctx.restore();
    if(countdownTimer>=3400) phase='playing';
    return;
  }

  // hawk timer
  if(phase==='playing'){
    hawkTimer-=dt;
    if(hawkTimer<=0&&!hawk.active) launchHawk();
  }

  updatePlayer();
  rivals.forEach(r=>updateRival(r));
  updateHawk();
  updateFloaties();
  maintainVeggies();

  // draw
  drawBg();
  veggies.forEach(v=>drawVeggie(v));
  houses.forEach(h=>drawHouse(h));
  rivals.forEach(r=>drawGP(r,false));
  drawGP(player,true);
  drawHawk();
  drawFloaties();

  document.getElementById('hud-score').textContent=player.score;
  document.getElementById('hud-houses').textContent=Math.max(1,BASE_HOUSES-(round-1));
}

// ── start ─────────────────────────────────────────────────────────────────
frameId=requestAnimationFrame(loop);

document.getElementById('start-btn').addEventListener('click',()=>{
  round=1; playerTotal=0; rivalTotals=[0,0,0]; firstHawk=true;
  overlay.classList.add('hidden');
  initRound();
});
</script>
