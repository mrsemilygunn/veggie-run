<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Veggie Run!</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#f5f0e8;
  --paper-dark:#e8e0cc;
  --ink:#1a1208;
  --ink-mid:#3d2f1a;
  --grass-paper:#c8d9a0;
  --accent:#b85c2a;
  --accent2:#4a7c3f;
  --red-ink:#9b2020;
}

body{
  background:#d6cdb8;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(0,0,0,0.04) 28px),
    repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(0,0,0,0.02) 28px);
  font-family:'Caveat',cursive;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
  user-select:none;
}

#hud{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:800px;
  max-width:98vw;
  padding:8px 16px;
  background:var(--paper);
  border:2px solid var(--ink);
  border-bottom:none;
  border-radius:0;
  color:var(--ink);
  font-family:'Special Elite',cursive;
  font-size:16px;
  gap:10px;
  flex-wrap:wrap;
  /* torn paper top edge */
  clip-path:polygon(0 6px,1% 0,2% 5px,3% 1px,5% 4px,7% 0,9% 3px,12% 0,15% 5px,18% 1px,22% 4px,26% 0,30% 3px,35% 1px,40% 5px,45% 0,50% 4px,55% 1px,60% 5px,65% 0,70% 3px,75% 1px,80% 4px,85% 0,90% 5px,94% 1px,97% 4px,100% 0,100% 100%,0 100%);
}

.hud-block{display:flex;align-items:center;gap:6px}
.hud-label{font-size:12px;font-family:'Caveat',cursive;opacity:0.55;text-transform:lowercase;letter-spacing:0.5px}
.hud-val{font-size:20px;color:var(--ink);font-weight:700}

#round-badge{
  background:var(--ink);
  color:var(--paper);
  border-radius:0;
  padding:2px 12px;
  font-size:15px;
  font-family:'Special Elite',cursive;
  letter-spacing:1px;
  transform:rotate(-1deg);
  display:inline-block;
}

#game-wrap{position:relative;width:800px;max-width:98vw}

canvas{
  display:block;
  width:100%;
  height:auto;
  border:2px solid var(--ink);
  border-top:none;
  cursor:none;
}

#danger-vignette{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0;
  box-shadow:inset 0 0 90px 50px rgba(155,32,32,0.55);
  transition:opacity 0.4s;
  z-index:5;
  mix-blend-mode:multiply;
}
#danger-vignette.active{opacity:1;animation:pulse-danger 1s infinite alternate}
@keyframes pulse-danger{from{opacity:0.65}to{opacity:1}}

#overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(245,240,232,0.94);
  z-index:20;
  color:var(--ink);
  text-align:center;
  padding:24px;
}
#overlay.hidden{display:none}

#overlay h2{
  font-family:'Special Elite',cursive;
  font-size:clamp(1.6rem,5vw,2.8rem);
  color:var(--ink);
  margin-bottom:8px;
  /* hand-drawn underline */
  text-decoration:underline;
  text-decoration-style:wavy;
  text-decoration-color:var(--accent);
  text-underline-offset:6px;
}
#overlay p{font-size:17px;color:var(--ink-mid);max-width:480px;line-height:1.6;margin-bottom:18px;font-family:'Caveat',cursive}
#overlay .scores{
  display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:20px
}
#overlay .score-card{
  background:var(--paper-dark);
  border:1.5px solid var(--ink);
  border-radius:0;
  padding:10px 16px;
  font-family:'Special Elite',cursive;
  font-size:17px;
  transform:rotate(-0.5deg);
  min-width:110px;
}
#overlay .score-card:nth-child(even){transform:rotate(0.8deg)}
#overlay .score-card span{display:block;font-family:'Caveat',cursive;font-size:13px;opacity:0.6;margin-bottom:2px}

#start-btn{
  font-family:'Special Elite',cursive;
  font-size:18px;
  background:var(--ink);
  color:var(--paper);
  border:none;
  border-radius:0;
  padding:10px 28px;
  cursor:pointer;
  letter-spacing:1px;
  transition:background 0.1s,transform 0.1s;
  transform:rotate(-0.5deg);
}
#start-btn:hover{background:var(--ink-mid);transform:rotate(0.5deg) scale(1.03)}
#start-btn:active{transform:scale(0.97)}

#hawk-warning{
  position:absolute;
  top:12px;left:50%;transform:translateX(-50%);
  font-family:'Special Elite',cursive;
  font-size:18px;
  color:var(--paper);
  background:var(--red-ink);
  border-radius:0;
  padding:5px 18px;
  z-index:10;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
  transition:opacity 0.3s;
  letter-spacing:2px;
  border:1.5px solid var(--ink);
}
#hawk-warning.show{opacity:1}
</style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <div>
      <div class="hud-label">Your veggies</div>
      <div class="hud-val" id="hud-score">0 🥕</div>
    </div>
  </div>
  <div class="hud-block">
    <div id="round-badge">Round 1</div>
  </div>
  <div class="hud-block">
    <div>
      <div class="hud-label">Hidey houses</div>
      <div class="hud-val" id="hud-houses">5 🏠</div>
    </div>
  </div>
</div>

<div id="game-wrap">
  <canvas id="c" width="800" height="560"></canvas>
  <div id="danger-vignette"></div>
  <div id="hawk-warning">🦅 HAWK!</div>

  <div id="overlay">
    <h2>🐹 Veggie Run!</h2>
    <p>Collect veggies with the arrow keys. When the hawk appears — hide in a 🏠 house! Each round there are fewer houses...</p>
    <button id="start-btn">Start Game</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 560;

// ── helpers ──────────────────────────────────────────────────────────────
function rnd(a,b){return a+Math.random()*(b-a)}
function rndInt(a,b){return Math.floor(rnd(a,b+1))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

// ── game state ────────────────────────────────────────────────────────────
const VEGGIES = ['🥕','🥦','🌽','🥬','🍅','🫑'];
const VEGGIE_SCORE = {'🥕':1,'🥦':2,'🌽':1,'🥬':1,'🍅':2,'🫑':2};
const TOTAL_ROUNDS = 5;
const BASE_HOUSES = 5; // round 1 houses

let round=1, phase='title'; // phases: title, countdown, playing, hawk, hawk-grace, result, gameover
let countdownVal=3, countdownTimer=0;
let firstHawk=true;
let keys={};
let frameId;

let player, rivals, veggies, houses, hawk;
let hawkTimer=0, hawkInterval=0;
let veggieCap=14; // max veggies on screen at once
let dangerEl=document.getElementById('danger-vignette');
let warningEl=document.getElementById('hawk-warning');
let overlay=document.getElementById('overlay');
let scoreDisplay={};

// total scores across rounds
let playerTotal=0;
let rivalTotals=[0,0,0];

// ── grass tile pattern (unused - kept for reference) ──────────────────────

// ── drawing helpers ───────────────────────────────────────────────────────
function drawEmoji(e,x,y,size,flip=false,opacity=1){
  ctx.save();
  ctx.globalAlpha=opacity;
  ctx.font=`${size}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  if(flip){ctx.scale(-1,1);x=-x;}
  ctx.fillText(e,x,y);
  ctx.restore();
}

// floaty penalty text popups
let floaties=[];
function spawnFloaty(x,y,text,color='#ff4444'){
  floaties.push({x,y,text,color,life:1.0});
}
function updateFloaties(){
  floaties=floaties.filter(f=>f.life>0);
  floaties.forEach(f=>f.life-=0.018);
}
function drawFloaties(){
  floaties.forEach(f=>{
    ctx.save();
    ctx.globalAlpha=f.life;
    ctx.font=`bold 20px 'Special Elite',cursive`;
    ctx.fillStyle=f.color;
    ctx.strokeStyle='rgba(245,240,232,0.8)';
    ctx.lineWidth=3;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    let yOff=(1-f.life)*55;
    ctx.strokeText(f.text,f.x,f.y-yOff);
    ctx.fillText(f.text,f.x,f.y-yOff);
    ctx.restore();
  });
}

function drawGP(gp, isPlayer=false){
  if(gp.hiding){
    ctx.save(); ctx.globalAlpha=0.35;
    drawEmoji('🐹',gp.x,gp.y,22,gp.vx<0);
    ctx.restore(); return;
  }
  // caught — show dazed star
  if(gp.caught){
    drawEmoji('💫',gp.x,gp.y-18,16);
  }

  let opacity = gp.caught ? 0.55 : 1;
  drawEmoji('🐹',gp.x,gp.y,isPlayer?28:22,gp.vx<0,opacity);
  if(isPlayer){
    ctx.save();
    ctx.font='bold 11px Nunito,sans-serif';
    ctx.fillStyle='#ffd84d';
    ctx.textAlign='center';
    ctx.fillText('YOU',gp.x,gp.y-22);
    ctx.restore();
  }
}

function drawHouse(h){
  ctx.save();
  let by = h.bounce ? Math.sin(Date.now()/120)*5 : 0;
  let y = h.y + by;

  if(h.bounce && h.occupant===null){
    ctx.shadowColor='#ffd84d';
    ctx.shadowBlur=20;
  }

  ctx.font='38px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  if(h.occupant!==null){
    // occupied: slightly dim, draw a little lock indicator
    ctx.globalAlpha=0.75;
    ctx.fillText('🏠',h.x,y);
    ctx.globalAlpha=1;
    ctx.font='13px serif';
    ctx.fillText('🔒',h.x+14,y-14);
  } else {
    ctx.fillText('🏠',h.x,y);
  }
  ctx.restore();
}

function drawVeggie(v){
  if(v.collected) return;
  // bob
  let bob=Math.sin(Date.now()/400+v.phase)*3;
  drawEmoji(v.type,v.x,v.y+bob,22);
}

function drawHawk(){
  if(!hawk.active) return;
  if(hawk.trail && hawk.trail.length>1){
    ctx.save();
    ctx.strokeStyle='rgba(180,60,60,0.15)';
    ctx.lineWidth=2;
    ctx.setLineDash([4,8]);
    ctx.beginPath();
    hawk.trail.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.stroke();
    ctx.restore();
  }
  drawEmoji('🦅',hawk.x,hawk.y,46,hawk.vx<0);
}

function launchHawk(){
  // enter from a random edge
  let side=rndInt(0,3); // 0=top,1=right,2=bottom,3=left
  let sx,sy;
  if(side===0){sx=rnd(100,W-100);sy=-60;}
  else if(side===1){sx=W+60;sy=rnd(80,H-80);}
  else if(side===2){sx=rnd(100,W-100);sy=H+60;}
  else{sx=-60;sy=rnd(80,H-80);}

  let spd=2.2+round*0.2;
  hawk={
    active:true,
    x:sx,y:sy,
    vx:rnd(-1,1),vy:rnd(-1,1),
    speed:spd,
    trail:[],
    done:false
  };

  player.caught=false;
  rivals.forEach(r=>r.caught=false);

  dangerEl.classList.add('active');
  warningEl.classList.add('show');
  warningEl.textContent='🦅 HAWK!';
  houses.forEach(h=>h.bounce=true);

  if(firstHawk){
    phase='hawk-grace';
    firstHawk=false;
    setTimeout(()=>{if(phase==='hawk-grace') phase='hawk';},4000);
  } else {
    phase='hawk';
  }
}

function updateHawk(){
  if(!hawk.active) return;

  // ── find target: nearest unhidden, uncaught guinea pig ──
  let targets=[];
  if(!player.hiding && !player.caught) targets.push(player);
  rivals.forEach(r=>{if(!r.hiding && !r.caught) targets.push(r);});

  // check if all guinea pigs are safe or caught — end round
  let allDone = targets.length===0;
  if(allDone){
    hawk.active=false;
    dangerEl.classList.remove('active');
    warningEl.classList.remove('show');
    houses.forEach(h=>{h.bounce=false; h.occupant=null;});
    if(player.hiding) leaveHouse(player);
    rivals.forEach(r=>{if(r.hiding)leaveHouse(r);});
    endRound();
    return;
  }

  // steer toward nearest target
  let nearest=null, nd=Infinity;
  targets.forEach(t=>{let d=dist(hawk,t);if(d<nd){nd=d;nearest=t;}});

  if(nearest){
    let dx=nearest.x-hawk.x, dy=nearest.y-hawk.y, d=Math.hypot(dx,dy)||1;
    let turnRate=0.06; // how sharply hawk can turn
    hawk.vx+=(dx/d)*turnRate;
    hawk.vy+=(dy/d)*turnRate;
  }

  // keep hawk inside field with soft boundary push
  let margin=60;
  if(hawk.x<margin)   hawk.vx+=0.15;
  if(hawk.x>W-margin) hawk.vx-=0.15;
  if(hawk.y<margin)   hawk.vy+=0.15;
  if(hawk.y>H-margin) hawk.vy-=0.15;

  // normalize to constant speed
  let spd=Math.hypot(hawk.vx,hawk.vy)||1;
  hawk.vx=hawk.vx/spd*hawk.speed;
  hawk.vy=hawk.vy/spd*hawk.speed;

  hawk.x+=hawk.vx;
  hawk.y+=hawk.vy;

  hawk.trail.push({x:hawk.x,y:hawk.y});
  if(hawk.trail.length>30) hawk.trail.shift();

  // catches
  if(phase==='hawk'){
    if(!player.hiding && !player.caught && dist(hawk,player)<44){
      player.caught=true;
      let penalty=Math.max(5,Math.round(player.score*0.25));
      player.score=Math.max(0,player.score-penalty);
      spawnFloaty(player.x,player.y-10,`-${penalty} 🥕`);
      warningEl.textContent='😱 CAUGHT!';
      setTimeout(()=>{if(hawk.active)warningEl.textContent='🦅 HAWK!';},1500);
    }
    rivals.forEach(r=>{
      if(!r.hiding && !r.caught && dist(hawk,r)<38){
        r.caught=true;
        let pen=Math.max(3,Math.round(r.score*0.25));
        r.score=Math.max(0,r.score-pen);
        spawnFloaty(r.x,r.y-10,`-${pen} 🥕`,'#ffaa44');
      }
    });
  }
}
function initRound(){
  let numHouses = Math.max(1, BASE_HOUSES - (round-1));
  document.getElementById('hud-houses').textContent=numHouses+' 🏠';
  document.getElementById('round-badge').textContent='Round '+round;

  // player
  player={
    x:W/2, y:H/2,
    vx:0, vy:0,
    speed:1.6,
    score:0,
    hiding:false,
    houseRef:null,
    caught:false
  };

  // rivals (3 AI guinea pigs) — slow and deliberate
  rivals=[
    {x:120,y:120,vx:0,vy:0,speed:0.9,score:0,hiding:false,houseRef:null,target:null,caught:false},
    {x:W-120,y:120,vx:0,vy:0,speed:1.0,score:0,hiding:false,houseRef:null,target:null,caught:false},
    {x:W/2,y:H-120,vx:0,vy:0,speed:0.85,score:0,hiding:false,houseRef:null,target:null,caught:false},
  ];

  // veggies — start with a handful, they'll respawn continuously
  veggies=[];
  for(let i=0;i<veggieCap;i++) spawnVeggie();

  // houses
  houses=[];
  let margin=60;
  // spread houses around the map, not too close to center
  let candidates=[
    {x:margin,y:margin},{x:W-margin,y:margin},
    {x:margin,y:H-margin},{x:W-margin,y:H-margin},
    {x:W/2,y:margin},{x:W/2,y:H-margin},
    {x:margin,y:H/2},{x:W-margin,y:H/2},
    {x:200,y:200},{x:W-200,y:200},
    {x:200,y:H-200},{x:W-200,y:H-200},
  ];
  // shuffle
  candidates.sort(()=>Math.random()-0.5);
  for(let i=0;i<numHouses;i++){
    houses.push({x:candidates[i].x, y:candidates[i].y, occupant:null, bounce:false});
  }

  // hawk placeholder — launchHawk() fills it in properly
  hawk={active:false,x:-100,y:-100,vx:0,vy:0,trail:[]};
  hawkInterval = Math.max(12000, 22000 - (round-1)*2000);
  hawkTimer = hawkInterval;

  dangerEl.classList.remove('active');
  warningEl.classList.remove('show');
  // brief countdown before play starts
  countdownVal=3;
  countdownTimer=0;
  phase='countdown';
}

function spawnVeggie(){
  // keep away from houses
  let margin=40, attempts=0, x, y;
  do {
    x=margin+Math.random()*(W-margin*2);
    y=margin+Math.random()*(H-margin*2);
    attempts++;
  } while(attempts<10 && houses && houses.some(h=>Math.hypot(h.x-x,h.y-y)<50));

  veggies.push({
    x, y,
    type:VEGGIES[rndInt(0,VEGGIES.length-1)],
    collected:false,
    phase:Math.random()*Math.PI*2
  });
}

function maintainVeggies(){
  // remove collected, respawn up to cap
  veggies=veggies.filter(v=>!v.collected);
  while(veggies.length<veggieCap) spawnVeggie();
}

// ── AI ────────────────────────────────────────────────────────────────────
function updateRival(r){
  if(r.hiding) return;

  if(phase==='hawk'||phase==='hawk-grace'){
    if(r.caught){
      // stumble slowly away from hawk
      if(hawk.active){
        let hx=r.x-hawk.x, hy=r.y-hawk.y, hd=Math.hypot(hx,hy)||1;
        r.x+=hx/hd*r.speed*0.3;
        r.y+=hy/hd*r.speed*0.3;
        clampToWorld(r);
      }
      return;
    }

    // find nearest free house
    let best=null, bd=Infinity;
    houses.forEach(h=>{
      if(h.occupant===null||h.occupant===r){
        let d=dist(r,h); if(d<bd){bd=d;best=h;}
      }
    });

    // actively flee hawk while moving toward house
    let mx=0,my=0;
    if(best){
      let dx=best.x-r.x, dy=best.y-r.y, d=Math.hypot(dx,dy)||1;
      mx=dx/d; my=dy/d;
    }
    if(hawk.active){
      let hx=r.x-hawk.x, hy=r.y-hawk.y, hd=Math.hypot(hx,hy)||1;
      let urgency=Math.max(0,1-hd/250);
      mx+=hx/hd*(1+urgency*3);
      my+=hy/hd*(1+urgency*3);
      let ml=Math.hypot(mx,my)||1;
      mx/=ml; my/=ml;
    }
    r.x+=mx*r.speed*1.5;
    r.y+=my*r.speed*1.5;
    r.vx=mx; r.vy=my;
    clampToWorld(r);

    // enter house if close enough and vacant
    if(best && dist(r,best)<28 && best.occupant===null){
      hideIn(r,best);
    }
    return;
  }

  // foraging
  if(!r.target||r.target.collected){
    let best=null,bd=Infinity;
    veggies.forEach(v=>{
      if(!v.collected){let d=dist(r,v);if(d<bd){bd=d;best=v;}}
    });
    r.target=best;
  }
  if(r.target){
    moveToward(r,r.target.x,r.target.y);
    if(dist(r,r.target)<20){
      r.target.collected=true;
      r.score+=VEGGIE_SCORE[r.target.type]||1;
      r.target=null;
    }
  }
  clampToWorld(r);
}

function moveToward(e,tx,ty){
  let dx=tx-e.x, dy=ty-e.y, d=Math.hypot(dx,dy);
  if(d<1) return;
  e.vx=dx/d*e.speed; e.vy=dy/d*e.speed;
  e.x+=e.vx; e.y+=e.vy;
}

function hideIn(entity,house){
  house.occupant=entity;
  entity.hiding=true;
  entity.houseRef=house;
  entity.x=house.x; entity.y=house.y;
}

function leaveHouse(entity){
  if(entity.houseRef){entity.houseRef.occupant=null;}
  entity.hiding=false; entity.houseRef=null;
}

function clampToWorld(e){
  e.x=clamp(e.x,20,W-20);
  e.y=clamp(e.y,20,H-20);
}

// ── hawk logic ────────────────────────────────────────────────────────────
function launchHawk(){
  let fromLeft=Math.random()<0.5;
  // hawk speed: slow enough to give time to react, faster each round
  let speed = 1.8 + round*0.2;
  hawk.x=fromLeft?-80:W+80;
  hawk.y=60+Math.random()*(H*0.45);
  hawk.vx=fromLeft?speed:-speed;
  hawk.active=true;
  hawk.done=false;
  // reset caught states for this pass
  player.caught=false;
  rivals.forEach(r=>r.caught=false);

  dangerEl.classList.add('active');
  warningEl.classList.add('show');
  warningEl.textContent='🦅 HAWK!';
  houses.forEach(h=>h.bounce=true);

  if(firstHawk){
    phase='hawk-grace';
    firstHawk=false;
    // extra 4 seconds grace on first hawk
    setTimeout(()=>{if(phase==='hawk-grace') phase='hawk';},4000);
  } else {
    phase='hawk';
  }
}

function updateHawk(){
  if(!hawk.active) return;
  hawk.x+=hawk.vx;
  // hawk gone off screen — this ends the round
  if(hawk.x<-120||hawk.x>W+120){
    hawk.active=false;
    dangerEl.classList.remove('active');
    warningEl.classList.remove('show');
    houses.forEach(h=>{h.bounce=false; h.occupant=null;});
    // release everyone
    if(player.hiding) leaveHouse(player);
    rivals.forEach(r=>{if(r.hiding)leaveHouse(r);});
    // round is over!
    endRound();
    return;
  }

  // catch unsheltered guinea pigs during hawk phase
  if(phase==='hawk'){
    // check player
    if(!player.hiding && !player.caught){
      if(Math.abs(hawk.x-player.x)<52&&Math.abs(hawk.y-player.y)<60){
        player.caught=true;
        player.score=Math.max(0,player.score-4);
        showCaughtEffect('player');
      }
    }
    // check rivals
    rivals.forEach(r=>{
      if(!r.hiding && !r.caught){
        if(Math.abs(hawk.x-r.x)<52&&Math.abs(hawk.y-r.y)<60){
          r.caught=true;
          r.score=Math.max(0,r.score-3);
        }
      }
    });
  }
}

// (caught feedback now via spawnFloaty — see updateHawk)

// ── player input ──────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  // prevent page scroll
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.code]=false);

function updatePlayer(){
  if(player.hiding){
    if(phase==='playing'&&(keys.ArrowUp||keys.ArrowDown||keys.ArrowLeft||keys.ArrowRight)){
      leaveHouse(player);
    }
    return;
  }

  let dx=0,dy=0;
  if(keys.ArrowLeft||keys.KeyA){dx=-1;}
  if(keys.ArrowRight||keys.KeyD){dx=1;}
  if(keys.ArrowUp||keys.KeyW){dy=-1;}
  if(keys.ArrowDown||keys.KeyS){dy=1;}
  if(dx&&dy){dx*=0.707;dy*=0.707;}

  // caught players move at half speed and can't collect
  let spd = player.caught ? player.speed*0.5 : player.speed;
  player.vx=dx*spd;
  player.vy=dy*spd;
  player.x+=player.vx;
  player.y+=player.vy;
  clampToWorld(player);

  // collect veggies unless caught
  if(!player.caught){
    veggies.forEach(v=>{
      if(!v.collected&&dist(player,v)<22){
        v.collected=true;
        player.score+=VEGGIE_SCORE[v.type]||1;
      }
    });
  }

  // enter house during hawk (either phase)
  if((phase==='hawk'||phase==='hawk-grace') && !player.caught){
    houses.forEach(h=>{
      if(h.occupant===null&&dist(player,h)<30){
        hideIn(player,h);
      }
    });
  }
}

function endRound(){
  phase='result';
  // save scores
  playerTotal+=player.score;
  rivals.forEach((r,i)=>rivalTotals[i]+=r.score);

  if(round>=TOTAL_ROUNDS){
    showGameOver();
  } else {
    showRoundResult();
  }
}

function showRoundResult(){
  dangerEl.classList.remove('active');
  warningEl.classList.remove('show');

  // safe = was hiding when hawk left. caught = got hit by hawk. 
  // If there weren't enough houses, unhidden guinea pigs who weren't physically hit are neither — show neutral.
  let numHouses = Math.max(1, BASE_HOUSES - (round-1));
  let totalGPs = 4; // player + 3 rivals
  let housesShorted = numHouses < totalGPs;

  function safeStatus(gp){
    if(gp.caught) return 'caught';
    if(gp.hiding) return 'safe';
    // was outside but not hit — only show as "safe" if there were enough houses for everyone
    return housesShorted ? 'lucky' : 'safe';
  }

  let allGPs=[
    {name:'You', gp:player, score:player.score, total:playerTotal},
    {name:'Ginger', gp:rivals[0], score:rivals[0].score, total:rivalTotals[0]},
    {name:'Rosie',  gp:rivals[1], score:rivals[1].score, total:rivalTotals[1]},
    {name:'Biscuit',gp:rivals[2], score:rivals[2].score, total:rivalTotals[2]},
  ].map(p=>({...p, status:safeStatus(p.gp)}))
   .sort((a,b)=>b.score-a.score);

  function safeTag(status){
    if(status==='safe')   return '<span style="color:#86efac">✓ safe</span>';
    if(status==='caught') return '<span style="color:#fca5a5">✗ caught</span>';
    return '<span style="color:#fde68a">~ outside</span>';
  }

  let nextHouses=Math.max(1,BASE_HOUSES-round);
  let html=`<h2>Round ${round} done!</h2>
    <p>Next round: only <strong>${nextHouses} hidey house${nextHouses>1?'s':''}</strong>. Watch out!</p>
    <div class="scores">
    ${allGPs.map(p=>`<div class="score-card">🐹 ${p.name}<br>${safeTag(p.status)}<br><span>this round</span>+${p.score} 🥕<br><span>total</span>${p.total} 🥕</div>`).join('')}
    </div>
    <button id="start-btn">Round ${round+1} →</button>`;
  overlay.innerHTML=html;
  overlay.classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click',()=>{
    round++;
    overlay.classList.add('hidden');
    initRound();
  });
}

function showGameOver(){
  phase='gameover';
  dangerEl.classList.remove('active');
  warningEl.classList.remove('show');

  let all=[
    {name:'You',total:playerTotal,emoji:'🐹'},
    {name:'Ginger',total:rivalTotals[0],emoji:'🐹'},
    {name:'Rosie',total:rivalTotals[1],emoji:'🐹'},
    {name:'Biscuit',total:rivalTotals[2],emoji:'🐹'},
  ].sort((a,b)=>b.total-a.total);

  let winner=all[0];
  let playerWon=winner.name==='You';

  let html=`<h2>${playerWon?'🏆 You win!':'😢 '+winner.name+' wins!'}</h2>
    <p>${playerWon?'You collected the most veggies across all '+TOTAL_ROUNDS+' rounds. Champion guinea pig!':'Better luck next time! Keep practicing your veggie-grabbing skills.'}</p>
    <div class="scores">
    ${all.map((p,i)=>`<div class="score-card">${i===0?'🏆':i===1?'🥈':i===2?'🥉':''}${p.emoji} ${p.name}<br><span>total veggies</span>${p.total} 🥕</div>`).join('')}
    </div>
    <button id="start-btn">Play Again</button>`;
  overlay.innerHTML=html;
  overlay.classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click',()=>{
    round=1; playerTotal=0; rivalTotals=[0,0,0]; firstHawk=true;
    overlay.classList.add('hidden');
    document.getElementById('hud-score').textContent='0 🥕';
    initRound();
  });
}

// ── background ────────────────────────────────────────────────────────────
function drawBg(){
  // paper base
  ctx.fillStyle='#eee8d8';
  ctx.fillRect(0,0,W,H);

  // faint graph lines like graph paper
  ctx.save();
  ctx.strokeStyle='rgba(180,160,120,0.25)';
  ctx.lineWidth=0.8;
  for(let x=0;x<W;x+=28){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=0;y<H;y+=28){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  ctx.restore();

  // hand-drawn field border (slightly wobbly rectangle)
  ctx.save();
  ctx.strokeStyle='#3d2f1a';
  ctx.lineWidth=2.5;
  ctx.setLineDash([]);
  ctx.beginPath();
  // top
  ctx.moveTo(30,32); ctx.bezierCurveTo(200,28,600,34,W-30,30);
  // right
  ctx.bezierCurveTo(W-26,150,W-32,350,W-28,H-32);
  // bottom
  ctx.bezierCurveTo(600,H-28,200,H-34,30,H-30);
  // left
  ctx.bezierCurveTo(26,350,32,150,30,32);
  ctx.stroke();
  ctx.restore();

  // hatched grass fill inside border
  ctx.save();
  ctx.strokeStyle='#8aaa5a';
  ctx.lineWidth=1;
  ctx.globalAlpha=0.35;
  for(let i=0;i<W+H;i+=10){
    ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(0,i);ctx.stroke();
  }
  ctx.restore();

  // scattered hand-drawn grass tufts
  ctx.save();
  ctx.strokeStyle='#5a7a30';
  ctx.lineWidth=1.5;
  ctx.globalAlpha=0.5;
  const tufts=[[80,80],[200,140],[400,60],[620,100],[720,200],[740,400],[600,460],[300,440],[150,380],[50,260],[500,300],[350,200]];
  tufts.forEach(([tx,ty])=>{
    for(let b=0;b<3;b++){
      let bx=tx+rnd(-14,14);
      ctx.beginPath();
      ctx.moveTo(bx,ty);
      ctx.quadraticCurveTo(bx+rnd(-4,4),ty-rnd(8,16),bx+rnd(-3,3),ty-rnd(14,22));
      ctx.stroke();
    }
  });
  ctx.restore();

  // dirt patches as pencil-hatched ovals
  ctx.save();
  ctx.strokeStyle='#a08050';
  ctx.lineWidth=1;
  ctx.globalAlpha=0.2;
  [[W*0.3,H*0.4,70,35,0.3],[W*0.7,H*0.65,55,28,-0.2],[W*0.15,H*0.72,45,22,0.1]].forEach(([x,y,rw,rh,rot])=>{
    ctx.save();ctx.translate(x,y);ctx.rotate(rot);
    for(let s=-rw;s<rw;s+=6){
      let yOff=Math.sqrt(Math.max(0,1-(s/rw)**2))*rh;
      ctx.beginPath();ctx.moveTo(s,-yOff);ctx.lineTo(s,yOff);ctx.stroke();
    }
    ctx.restore();
  });
  ctx.restore();
}

// ── main loop ─────────────────────────────────────────────────────────────
let last=0;
function loop(ts){
  let dt=ts-last; last=ts;
  frameId=requestAnimationFrame(loop);

  if(phase==='title'||phase==='result'||phase==='gameover') return;

  // countdown freeze
  if(phase==='countdown'){
    countdownTimer+=dt;
    // draw everything frozen
    drawBg();
    veggies.forEach(v=>drawVeggie(v));
    houses.forEach(h=>drawHouse(h));
    rivals.forEach(r=>drawGP(r,false));
    drawGP(player,true);
    // big countdown number
    let num = countdownTimer<1000?'3':countdownTimer<2000?'2':countdownTimer<3000?'1':'GO!';
    let scale = 1+(0.3*((countdownTimer%1000)/1000)); // pulse
    ctx.save();
    ctx.globalAlpha=Math.min(1,1.2-((countdownTimer%1000)/1000));
    ctx.font=`bold ${Math.round(80*scale)}px 'Special Elite',cursive`;
    ctx.fillStyle='#1a1208';
    ctx.strokeStyle='rgba(245,240,232,0.7)';
    ctx.lineWidth=5;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.strokeText(num,W/2,H/2);
    ctx.fillText(num,W/2,H/2);
    ctx.restore();
    if(countdownTimer>=3400) phase='playing';
    return;
  }

  // hawk timer
  if(phase==='playing'){
    hawkTimer-=dt;
    if(hawkTimer<=0&&!hawk.active) launchHawk();
  }

  updatePlayer();
  rivals.forEach(r=>updateRival(r));
  updateHawk();
  updateFloaties();
  maintainVeggies();

  // draw
  drawBg();
  veggies.forEach(v=>drawVeggie(v));
  houses.forEach(h=>drawHouse(h));
  rivals.forEach(r=>drawGP(r,false));
  drawGP(player,true);
  drawHawk();
  drawFloaties();

  // HUD score live
  document.getElementById('hud-score').textContent=player.score+' 🥕';
}

// ── start ─────────────────────────────────────────────────────────────────
frameId=requestAnimationFrame(loop);

document.getElementById('start-btn').addEventListener('click',()=>{
  round=1; playerTotal=0; rivalTotals=[0,0,0]; firstHawk=true;
  overlay.classList.add('hidden');
  initRound();
});
</script>
